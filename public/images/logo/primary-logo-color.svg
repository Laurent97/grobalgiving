<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="GlobalGiving logo">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F08B1D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97A16;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="36" cy="40" r="28"/>
    </clipPath>
  </defs>

  <!-- Icon: Globe -->
  <circle cx="36" cy="40" r="28" fill="url(#globeGrad)" />

  <!-- Globe grid lines -->
  <ellipse cx="36" cy="40" rx="14" ry="28" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" clip-path="url(#circleClip)"/>
  <ellipse cx="36" cy="40" rx="28" ry="11" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
  <ellipse cx="36" cy="40" rx="28" ry="20" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="36" y1="12" x2="36" y2="68" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
  <line x1="8" y1="40" x2="64" y2="40" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>

  <!-- Heart overlay (small, top-right of globe) -->
  <g transform="translate(52, 20) scale(0.75)">
    <path d="M10 6.5C10 4.015 8.21 2 6 2C4.5 2 3.18 2.83 2.5 4.07C1.82 2.83 0.5 2 -1 2C-3.21 2 -5 4.015 -5 6.5C-5 9.5 -2.5 12 2.5 16C7.5 12 10 9.5 10 6.5Z" fill="url(#heartGrad)" stroke="white" stroke-width="1"/>
  </g>

  <!-- Wordmark: GlobalGiving -->
  <text x="76" y="35" font-family="'Aleo', Georgia, serif" font-weight="700" font-size="26" fill="#3E4B59" letter-spacing="-0.5">Global</text>
  <text x="76" y="35" font-family="'Aleo', Georgia, serif" font-weight="700" font-size="26" fill="#F08B1D" letter-spacing="-0.5" dx="82">Giving</text>

  <!-- Tagline -->
  <text x="76" y="56" font-family="'Open Sans', Arial, sans-serif" font-weight="400" font-size="11" fill="#5a6a7a" letter-spacing="1.2">TOGETHER WE MAKE A DIFFERENCE</text>
</svg>
