<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E4B59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3441;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ogGlobe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F08B1D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97A16;stop-opacity:1" />
    </linearGradient>
    <clipPath id="ogCircle">
      <circle cx="900" cy="315" r="260"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative arc top-left -->
  <circle cx="-60" cy="-60" r="280" fill="none" stroke="rgba(240,139,29,0.12)" stroke-width="2"/>
  <circle cx="-60" cy="-60" r="360" fill="none" stroke="rgba(240,139,29,0.08)" stroke-width="2"/>

  <!-- Decorative arc bottom-right -->
  <circle cx="1260" cy="690" r="300" fill="none" stroke="rgba(240,139,29,0.1)" stroke-width="2"/>

  <!-- Globe icon -->
  <circle cx="900" cy="315" r="260" fill="url(#ogGlobe)" opacity="0.18"/>
  <circle cx="900" cy="315" r="260" fill="none" stroke="rgba(240,139,29,0.5)" stroke-width="2"/>
  <ellipse cx="900" cy="315" rx="130" ry="260" fill="none" stroke="rgba(240,139,29,0.35)" stroke-width="1.5" clip-path="url(#ogCircle)"/>
  <ellipse cx="900" cy="315" rx="260" ry="100" fill="none" stroke="rgba(240,139,29,0.35)" stroke-width="1.5"/>
  <ellipse cx="900" cy="315" rx="260" ry="180" fill="none" stroke="rgba(240,139,29,0.2)" stroke-width="1"/>
  <line x1="900" y1="55" x2="900" y2="575" stroke="rgba(240,139,29,0.35)" stroke-width="1.5"/>
  <line x1="640" y1="315" x2="1160" y2="315" stroke="rgba(240,139,29,0.35)" stroke-width="1.5"/>

  <!-- Heart on globe -->
  <g transform="translate(900, 200) scale(5)">
    <path d="M9 5C9 2.8 7.4 1 5.5 1C4.25 1 3.17 1.72 2.5 2.82C1.83 1.72 0.75 1 -0.5 1C-2.4 1 -4 2.8 -4 5C-4 7.6 -1.5 10 2.5 14C6.5 10 9 7.6 9 5Z" fill="#F08B1D" opacity="0.9"/>
  </g>

  <!-- Brand text -->
  <text x="80" y="240" font-family="Georgia, serif" font-weight="700" font-size="88" fill="white" letter-spacing="-2">Global</text>
  <text x="80" y="340" font-family="Georgia, serif" font-weight="700" font-size="88" fill="#F08B1D" letter-spacing="-2">Giving</text>

  <!-- Tagline -->
  <text x="82" y="405" font-family="Arial, sans-serif" font-weight="400" font-size="26" fill="rgba(255,255,255,0.7)" letter-spacing="3">TOGETHER WE MAKE A DIFFERENCE</text>

  <!-- Bottom strip -->
  <rect x="0" y="580" width="1200" height="50" fill="#F08B1D" opacity="0.9"/>
  <text x="600" y="614" font-family="Arial, sans-serif" font-weight="600" font-size="20" fill="white" text-anchor="middle" letter-spacing="1">globalgiving.online</text>
</svg>
